<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Debug Test</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h4>Login Debug Test</h4>
                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label class="form-label">Test Method:</label>
                            <select class="form-control" id="testMethod">
                                <option value="register">Register New User First</option>
                                <option value="login">Try Direct Login</option>
                                <option value="demo">Create Demo User</option>
                            </select>
                        </div>
                        
                        <form id="testForm">
                            <div class="mb-3">
                                <label class="form-label">Mobile Number</label>
                                <input type="tel" class="form-control" id="testMobile" value="+919999999999" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Date of Birth</label>
                                <input type="date" class="form-control" id="testDOB" value="1990-01-01" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Name (for registration)</label>
                                <input type="text" class="form-control" id="testName" value="Test User">
                            </div>
                            <button type="submit" class="btn btn-primary">Test Login</button>
                        </form>
                        
                        <div class="mt-3">
                            <button onclick="checkLocalStorage()" class="btn btn-info">Check LocalStorage</button>
                            <button onclick="clearAllData()" class="btn btn-danger">Clear All Data</button>
                        </div>
                        
                        <div id="result" class="mt-3"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Test functions
        function testRegistration(mobile, dob, name) {
            console.log('Testing registration...');
            
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            
            // Check if user already exists
            if (users.find(u => u.mobile === mobile)) {
                return { success: false, message: 'User already exists' };
            }
            
            // Create new user
            const newUser = {
                id: Date.now(),
                name: name,
                mobile: mobile,
                dob: dob,
                village: 'Test Village',
                userType: 'buyer',
                createdAt: new Date().toISOString()
            };
            
            users.push(newUser);
            localStorage.setItem('users', JSON.stringify(users));
            
            return { success: true, message: 'User registered successfully', user: newUser };
        }
        
        function testLogin(mobile, dob) {
            console.log('Testing login...');
            
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            const user = users.find(u => u.mobile === mobile && u.dob === dob);
            
            if (user) {
                localStorage.setItem('currentUser', JSON.stringify(user));
                return { success: true, message: 'Login successful', user: user };
            } else {
                return { success: false, message: 'User not found. Please register first.' };
            }
        }
        
        function createDemoUser(mobile, dob) {
            console.log('Creating demo user...');
            
            const demoUser = {
                id: Date.now(),
                name: 'Demo User',
                mobile: mobile,
                dob: dob,
                village: 'Demo Village',
                userType: 'buyer',
                createdAt: new Date().toISOString()
            };
            
            localStorage.setItem('currentUser', JSON.stringify(demoUser));
            
            return { success: true, message: 'Demo user created and logged in', user: demoUser };
        }
        
        function checkLocalStorage() {
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            const currentUser = JSON.parse(localStorage.getItem('currentUser') || 'null');
            
            const result = `
                <div class="alert alert-info">
                    <h5>LocalStorage Status:</h5>
                    <p><strong>Users:</strong> ${users.length} users stored</p>
                    <p><strong>Current User:</strong> ${currentUser ? currentUser.name : 'Not logged in'}</p>
                    <p><strong>Users List:</strong></p>
                    <ul>
                        ${users.map(u => `<li>${u.name} - ${u.mobile} - ${u.dob}</li>`).join('')}
                    </ul>
                </div>
            `;
            
            document.getElementById('result').innerHTML = result;
        }
        
        function clearAllData() {
            localStorage.clear();
            document.getElementById('result').innerHTML = '<div class="alert alert-warning">All data cleared from localStorage</div>';
        }
        
        // Form submission
        document.getElementById('testForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const method = document.getElementById('testMethod').value;
            const mobile = document.getElementById('testMobile').value;
            const dob = document.getElementById('testDOB').value;
            const name = document.getElementById('testName').value;
            
            let result;
            
            switch(method) {
                case 'register':
                    result = testRegistration(mobile, dob, name);
                    break;
                case 'login':
                    result = testLogin(mobile, dob);
                    break;
                case 'demo':
                    result = createDemoUser(mobile, dob);
                    break;
            }
            
            const resultHtml = `
                <div class="alert ${result.success ? 'alert-success' : 'alert-danger'}">
                    <h5>${result.success ? 'Success' : 'Error'}</h5>
                    <p>${result.message}</p>
                    ${result.user ? `<pre>${JSON.stringify(result.user, null, 2)}</pre>` : ''}
                </div>
            `;
            
            document.getElementById('result').innerHTML = resultHtml;
        });
        
        // Check localStorage on load
        window.addEventListener('load', checkLocalStorage);
    </script>
</body>
</html>
