<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Test - Village Seeds</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h4>Login Test - Village Seeds</h4>
                    </div>
                    <div class="card-body">
                        <form onsubmit="testLogin(event)">
                            <div class="mb-3">
                                <label class="form-label">Mobile Number</label>
                                <input type="tel" class="form-control" id="testMobile" placeholder="Enter mobile number" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Date of Birth</label>
                                <input type="date" class="form-control" id="testDOB" required>
                            </div>
                            <button type="submit" class="btn btn-success w-100">Test Login</button>
                        </form>
                        <div class="mt-3">
                            <button onclick="showLoginForm()" class="btn btn-primary">Show Original Login Form</button>
                        </div>
                        <div id="result" class="mt-3"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Original Login Modal (Hidden) -->
    <div class="modal fade" id="authModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Login</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="loginForm">
                        <form onsubmit="handleLogin(event)">
                            <div class="mb-3">
                                <label class="form-label">Mobile Number</label>
                                <input type="tel" class="form-control" id="loginMobile" placeholder="Enter mobile number" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Date of Birth</label>
                                <input type="date" class="form-control" id="loginDOB" required>
                            </div>
                            <button type="submit" class="btn btn-success w-100">Login</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Test login function
        function testLogin(event) {
            event.preventDefault();
            
            const mobile = document.getElementById('testMobile').value;
            const dob = document.getElementById('testDOB').value;
            const resultDiv = document.getElementById('result');
            
            console.log('Test login:', { mobile, dob });
            
            // Create demo user
            const demoUser = {
                id: Date.now(),
                name: 'Test User',
                mobile: mobile,
                dob: dob,
                village: 'Test Village',
                userType: 'buyer'
            };
            
            // Store in localStorage
            localStorage.setItem('currentUser', JSON.stringify(demoUser));
            
            // Show success message
            resultDiv.innerHTML = `
                <div class="alert alert-success">
                    <h5>Login Successful!</h5>
                    <p>User: ${demoUser.name}</p>
                    <p>Mobile: ${demoUser.mobile}</p>
                    <p>Village: ${demoUser.village}</p>
                    <p>User Type: ${demoUser.userType}</p>
                </div>
            `;
            
            console.log('Test login successful:', demoUser);
        }
        
        // Show original login form
        function showLoginForm() {
            const modal = new bootstrap.Modal(document.getElementById('authModal'));
            modal.show();
        }
        
        // Original login function (from main file)
        function handleLogin(event) {
            event.preventDefault();
            console.log('Original handleLogin called');
            
            const mobile = document.getElementById('loginMobile').value;
            const dob = document.getElementById('loginDOB').value;
            
            console.log('Original login attempt:', { mobile, dob });
            
            // Create demo user
            const demoUser = {
                id: Date.now(),
                name: 'Original User',
                mobile: mobile,
                dob: dob,
                village: 'Original Village',
                userType: 'buyer'
            };
            
            localStorage.setItem('currentUser', JSON.stringify(demoUser));
            
            alert('Original login successful! User: ' + demoUser.name);
            
            // Close modal
            const modal = bootstrap.Modal.getInstance(document.getElementById('authModal'));
            modal.hide();
        }
        
        // Check if functions are loaded
        console.log('Login test page loaded');
        console.log('testLogin function exists:', typeof testLogin === 'function');
        console.log('handleLogin function exists:', typeof handleLogin === 'function');
    </script>
</body>
</html>
